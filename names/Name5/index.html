<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大作战 - 升级版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            text-align: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
        }

        /* 输入页面样式 */
        #inputPage {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }
        .title {
            font-size: 36px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
        }
        .input-section {
            margin-bottom: 25px;
            text-align: left;
        }
        .input-label {
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            padding: 8px 16px;
            border-radius: 20px;
        }
        .label-eat {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
        }
        .label-avoid {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: white;
        }
        .label-speed {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
        }
        .speed-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .speed-option {
            cursor: pointer;
        }
        .speed-option input {
            display: none;
        }
        .speed-btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 20px;
            background: #f3f4f6;
            color: #6b7280;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .speed-option input:checked + .speed-btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            border-color: #f59e0b;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
        }
        .speed-option:hover .speed-btn {
            background: #e5e7eb;
        }
        .speed-option input:checked + .speed-btn:hover {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        .difficulty-section {
            margin-bottom: 25px;
        }
        .difficulty-label {
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            padding: 8px 16px;
            border-radius: 20px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }
        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .difficulty-option {
            cursor: pointer;
        }
        .difficulty-option input {
            display: none;
        }
        .difficulty-btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 25px;
            background: #f3f4f6;
            color: #6b7280;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .difficulty-option input:checked + .difficulty-btn {
            border-color: #8b5cf6;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        .difficulty-option.easy input:checked + .difficulty-btn {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            border-color: #22c55e;
        }
        .difficulty-option.hard input:checked + .difficulty-btn {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
            border-color: #6b7280;
        }
        .difficulty-option:hover .difficulty-btn {
            background: #e5e7eb;
        }
        .difficulty-option.easy input:checked + .difficulty-btn:hover {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }
        .difficulty-option.hard input:checked + .difficulty-btn:hover {
            background: linear-gradient(135deg, #4b5563, #374151);
        }
        .label-icon {
            margin-right: 8px;
            font-size: 18px;
        }
        textarea {
            width: 100%;
            height: 80px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            transition: all 0.3s ease;
            background: #f9fafb;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            background: white;
        }
        .hint {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 6px;
            text-align: left;
        }
        .start-btn {
            padding: 14px 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        /* 游戏页面样式 */
        #gamePage {
            display: none;
            width: 100%;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto 15px;
            padding: 0 10px;
        }
        .game-title {
            font-size: 28px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .stats-panel {
            display: flex;
            gap: 20px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 16px;
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-icon {
            font-size: 18px;
        }
        .stat-value {
            font-weight: bold;
            font-size: 18px;
        }
        .stat-eat { color: #4ade80; }
        .stat-avoid { color: #f87171; }
        .game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.1);
        }
        /* 游戏区域网格背景 */
        .game-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
        }
        .snake-head {
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            position: absolute;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.8);
            z-index: 10;
            border: 2px solid #fff;
        }
        .snake-head::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #1a1a2e;
            border-radius: 50%;
            top: 5px;
            left: 5px;
        }
        .snake-head.dir-right::after { left: auto; right: 3px; }
        .snake-head.dir-left::after { left: 3px; }
        .snake-head.dir-down::after { top: auto; bottom: 3px; }
        .snake-head.dir-up::after { top: 3px; }

        .snake-segment {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            position: absolute;
            border-radius: 6px;
            box-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .food {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            padding: 4px 10px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.5);
            animation: pulse 1.5s infinite;
            white-space: nowrap;
        }
        .bad-food {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #f87171, #ef4444);
            padding: 4px 10px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(248, 113, 113, 0.5);
            animation: shake 0.5s infinite;
            white-space: nowrap;
        }
        /* Hard模式下坏食物样式 - 和好食物一样 */
        .hard-mode .bad-food {
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
            animation: pulse 1.5s infinite;
        }
        .hard-mode .food {
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }
        .hearts {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 28px;
            display: flex;
            gap: 5px;
        }
        .heart {
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 5px rgba(255, 0, 128, 0.5));
        }
        .heart.lost {
            filter: grayscale(1);
            opacity: 0.3;
            transform: scale(0.8);
        }
        .message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .message-text {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .message-win {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .message-lose {
            background: linear-gradient(135deg, #f87171, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .final-stats {
            color: white;
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }
        .go-back-btn {
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        .go-back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        .controls-hint {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第一页：输入界面 -->
        <div id="inputPage">
            <h1 class="title">贪吃蛇大作战</h1>

            <!-- 难度选择 -->
            <div class="difficulty-section">
                <div class="difficulty-label">
                    <span class="label-icon">🎮</span>
                    <span>游戏难度</span>
                </div>
                <div class="difficulty-selector">
                    <label class="difficulty-option easy">
                        <input type="radio" name="difficulty" value="easy" checked>
                        <span class="difficulty-btn">🌱 简单</span>
                    </label>
                    <label class="difficulty-option hard">
                        <input type="radio" name="difficulty" value="hard">
                        <span class="difficulty-btn">💀 困难</span>
                    </label>
                </div>
                <div class="hint" id="difficultyHint">简单模式：好单词绿色，坏单词红色，容易区分</div>
            </div>

            <div class="input-section">
                <div class="input-label label-eat">
                    <span class="label-icon">✅</span>
                    <span>要吃的单词</span>
                </div>
                <textarea id="eatInput" placeholder="例如: apple, banana, orange"></textarea>
                <div class="hint">输入要吃的单词，用逗号分隔</div>
            </div>
            <div class="input-section">
                <div class="input-label label-avoid">
                    <span class="label-icon">❌</span>
                    <span>要避开的单词</span>
                </div>
                <textarea id="avoidInput" placeholder="例如: bomb, danger, virus"></textarea>
                <div class="hint">输入要避开的单词，用逗号分隔</div>
            </div>
            <div class="input-section">
                <div class="input-label label-speed">
                    <span class="label-icon">⚡</span>
                    <span>移动速度</span>
                </div>
                <div class="speed-selector">
                    <label class="speed-option">
                        <input type="radio" name="speed" value="200" checked>
                        <span class="speed-btn">🐢 慢</span>
                    </label>
                    <label class="speed-option">
                        <input type="radio" name="speed" value="150">
                        <span class="speed-btn">🚶 中</span>
                    </label>
                    <label class="speed-option">
                        <input type="radio" name="speed" value="100">
                        <span class="speed-btn">🏃 快</span>
                    </label>
                    <label class="speed-option">
                        <input type="radio" name="speed" value="60">
                        <span class="speed-btn">🚀 极速</span>
                    </label>
                </div>
            </div>
            <button class="start-btn" onclick="startGame()">开始游戏</button>
        </div>

        <!-- 第二页：游戏界面 -->
        <div id="gamePage">
            <div class="game-header">
                <div class="game-title">贪吃蛇大作战</div>
                <div class="stats-panel">
                    <div class="stat-box">
                        <span class="stat-icon stat-eat">✅</span>
                        <span>剩余:</span>
                        <span class="stat-value stat-eat" id="eatCount">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-icon stat-avoid">❌</span>
                        <span>生命:</span>
                        <span class="stat-value stat-avoid" id="livesCount">3</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-icon" style="color: #fbbf24;">⚡</span>
                        <span>速度:</span>
                        <span class="stat-value" style="color: #fbbf24;" id="speedDisplay">中</span>
                    </div>
                </div>
            </div>
            <div class="game-container" id="gameCanvas">
                <div class="hearts" id="heartsDisplay"></div>
                <div class="message-overlay" id="messageOverlay">
                    <div class="message-text" id="messageText"></div>
                    <div class="final-stats" id="finalStats"></div>
                    <button class="go-back-btn" onclick="goBack()">再来一次</button>
                </div>
            </div>
            <div class="controls-hint">使用 ⬆️⬇️⬅️➡️ 方向键控制蛇的移动</div>
        </div>
    </div>

    <script>
        const snakeSpeed = 150;
        let score = 0;
        let badFoodCount = 0;
        const maxBadFoodCount = 3;
        let snake = [
            { x: 400, y: 300 },
            { x: 380, y: 300 },
            { x: 360, y: 300 }
        ];
        let food = [];
        let badFood = [];
        let dx = 20;
        let dy = 0;
        let gameInterval;
        let requiredWords = [];
        let forbiddenWords = [];
        let currentSpeed = 150;
        let isHardMode = false;

        function startGame() {
            const eatText = document.getElementById('eatInput').value;
            const avoidText = document.getElementById('avoidInput').value;

            // 获取选中的速度
            const speedRadio = document.querySelector('input[name="speed"]:checked');
            currentSpeed = parseInt(speedRadio.value);

            // 获取选中的难度
            const difficultyRadio = document.querySelector('input[name="difficulty"]:checked');
            isHardMode = difficultyRadio.value === 'hard';

            if (!eatText.trim()) {
                alert('请输入要吃的单词！');
                return;
            }
            if (!avoidText.trim()) {
                alert('请输入要避开的单词！');
                return;
            }

            requiredWords = eatText.split(',').map(word => word.trim()).filter(w => w);
            forbiddenWords = avoidText.split(',').map(word => word.trim()).filter(w => w);

            if (requiredWords.length === 0) {
                alert('请确保输入了要吃的单词！');
                return;
            }

            // 根据难度模式设置游戏容器样式
            const gameCanvas = document.getElementById('gameCanvas');
            if (isHardMode) {
                gameCanvas.classList.add('hard-mode');
            } else {
                gameCanvas.classList.remove('hard-mode');
            }

            // 更新速度显示
            const speedLabels = { 200: '慢', 150: '中', 100: '快', 60: '极速' };
            document.getElementById('speedDisplay').textContent = speedLabels[currentSpeed];

            document.getElementById('inputPage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'block';

            updateStats();
            initializeFood();
            initializeHearts();
            document.addEventListener('keydown', handleKeyDown);
            startGameLoop();
        }

        function initializeFood() {
            const ctx = document.createElement('canvas').getContext('2d');
            ctx.font = '12px sans-serif';

            // 蛇的起始安全区域 (中心点400,300,半径100内不生成食物)
            const safeRadius = 100;
            const snakeCenterX = 400;
            const snakeCenterY = 300;

            function getRandomPosition() {
                let x, y;
                do {
                    x = Math.floor(Math.random() * 38) * 20 + 10;
                    y = Math.floor(Math.random() * 28) * 20 + 10;
                } while (Math.abs(x - snakeCenterX) < safeRadius && Math.abs(y - snakeCenterY) < safeRadius);
                return { x, y };
            }

            food = requiredWords.map(word => {
                const pos = getRandomPosition();
                return {
                    x: pos.x,
                    y: pos.y,
                    word: word,
                    width: getTextWidth(word, ctx)
                };
            });

            badFood = forbiddenWords.map(word => {
                const pos = getRandomPosition();
                return {
                    x: pos.x,
                    y: pos.y,
                    word: word,
                    width: getTextWidth(word, ctx)
                };
            });
        }

        function getTextWidth(text, ctx) {
            const measure = ctx.measureText(text);
            return Math.ceil(measure.width) + 24;
        }

        function initializeHearts() {
            const heartsDisplay = document.getElementById('heartsDisplay');
            heartsDisplay.innerHTML = '';
            for (let i = 0; i < maxBadFoodCount; i++) {
                const heart = document.createElement('span');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.id = `heart-${i}`;
                heartsDisplay.appendChild(heart);
            }
        }

        function updateStats() {
            document.getElementById('eatCount').textContent = requiredWords.length;
            document.getElementById('livesCount').textContent = maxBadFoodCount - badFoodCount;
        }

        function handleKeyDown(e) {
            if (e.key === 'ArrowLeft' && dx !== 20) {
                dx = -20;
                dy = 0;
            } else if (e.key === 'ArrowRight' && dx !== -20) {
                dx = 20;
                dy = 0;
            } else if (e.key === 'ArrowUp' && dy !== 20) {
                dx = 0;
                dy = -20;
            } else if (e.key === 'ArrowDown' && dy !== -20) {
                dx = 0;
                dy = 20;
            }
        }

        function startGameLoop() {
            gameInterval = setInterval(updateGame, currentSpeed);
        }

        function updateGame() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (checkCollision(head)) {
                endGame(false, '撞墙了！');
            } else {
                checkFoodCollision();
                checkBadFoodCollision();
                if (requiredWords.length === 0) {
                    endGame(true, '太棒了！全部吃完！');
                }
            }

            if (score < snake.length - 1) {
                snake.pop();
                score++;
            }

            drawGame();
        }

        function checkCollision(head) {
            if (head.x < 0 || head.x >= 800 || head.y < 0 || head.y >= 600) {
                return true;
            }
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    return true;
                }
            }
            return false;
        }

        function checkFoodCollision() {
            for (let i = 0; i < food.length; i++) {
                if (headNearFood(snake[0], food[i])) {
                    requiredWords.splice(requiredWords.indexOf(food[i].word), 1);
                    food.splice(i, 1);
                    updateStats();
                    break;
                }
            }
        }

        function checkBadFoodCollision() {
            for (let i = 0; i < badFood.length; i++) {
                if (headNearFood(snake[0], badFood[i])) {
                    badFoodCount++;
                    badFood.splice(i, 1);

                    // 更新心形显示
                    const lostHeart = document.getElementById(`heart-${maxBadFoodCount - badFoodCount}`);
                    if (lostHeart) {
                        lostHeart.classList.add('lost');
                    }

                    updateStats();
                    if (badFoodCount >= maxBadFoodCount) {
                        endGame(false, '生命耗尽！');
                    }
                    break;
                }
            }
        }

        function headNearFood(head, foodItem) {
            const { x, y, width } = foodItem;
            return (head.x <= x + width && head.x >= x - 20) && (head.y <= y + 20 && head.y >= y - 20);
        }

        function drawGame() {
            const gameCanvas = document.getElementById('gameCanvas');

            // 保留hearts和overlay，只清除食物和蛇
            const existingSnake = gameCanvas.querySelectorAll('.snake-head, .snake-segment, .food, .bad-food');
            existingSnake.forEach(el => el.remove());

            // 绘制蛇头
            const headDiv = document.createElement('div');
            headDiv.className = 'snake-head';
            headDiv.style.left = `${snake[0].x}px`;
            headDiv.style.top = `${snake[0].y}px`;

            // 根据方向添加眼睛位置类
            if (dx > 0) headDiv.classList.add('dir-right');
            else if (dx < 0) headDiv.classList.add('dir-left');
            else if (dy > 0) headDiv.classList.add('dir-down');
            else if (dy < 0) headDiv.classList.add('dir-up');

            gameCanvas.appendChild(headDiv);

            // 绘制蛇身
            for (let i = 1; i < snake.length; i++) {
                const div = document.createElement('div');
                div.className = 'snake-segment';
                div.style.left = `${snake[i].x}px`;
                div.style.top = `${snake[i].y}px`;
                gameCanvas.appendChild(div);
            }

            // 绘制食物
            food.forEach(f => {
                const div = document.createElement('div');
                div.className = 'food';
                div.style.left = `${f.x}px`;
                div.style.top = `${f.y}px`;
                div.style.width = `${f.width}px`;
                div.textContent = f.word;
                gameCanvas.appendChild(div);
            });

            // 绘制坏食物
            badFood.forEach(f => {
                const div = document.createElement('div');
                div.className = 'bad-food';
                div.style.left = `${f.x}px`;
                div.style.top = `${f.y}px`;
                div.style.width = `${f.width}px`;
                div.textContent = f.word;
                gameCanvas.appendChild(div);
            });
        }

        function endGame(isWin, reason) {
            clearInterval(gameInterval);
            gameInterval = null;

            const overlay = document.getElementById('messageOverlay');
            const messageText = document.getElementById('messageText');
            const finalStats = document.getElementById('finalStats');

            overlay.style.display = 'flex';

            if (isWin) {
                messageText.className = 'message-text message-win';
                messageText.textContent = '🎉 恭喜通关！';
                finalStats.innerHTML = `吃掉了 <span style="color: #4ade80">${forbiddenWords.length > 0 ? food.length === 0 ? '全部' : requiredWords.length : '0'}</span> 个单词<br>避开了 <span style="color: #f87171">${badFoodCount}</span> 个危险单词`;
            } else {
                messageText.className = 'message-text message-lose';
                messageText.textContent = reason;
                finalStats.innerHTML = `剩余 <span style="color: #4ade80">${requiredWords.length}</span> 个单词没吃完<br>避开了 <span style="color: #f87171">${badFoodCount}</span> 个危险单词`;
            }
        }

        function goBack() {
            document.getElementById('inputPage').style.display = 'block';
            document.getElementById('gamePage').style.display = 'none';

            // 重置游戏状态
            resetGameState();

            // 隐藏overlay
            document.getElementById('messageOverlay').style.display = 'none';

            // 清空输入框
            document.getElementById('eatInput').value = '';
            document.getElementById('avoidInput').value = '';
        }

        function resetGameState() {
            score = 0;
            badFoodCount = 0;
            snake = [
                { x: 400, y: 300 },
                { x: 380, y: 300 },
                { x: 360, y: 300 }
            ];
            dx = 20;
            dy = 0;
            requiredWords = [];
            forbiddenWords = [];
            food = [];
            badFood = [];
            isHardMode = false;
            document.getElementById('gameCanvas').classList.remove('hard-mode');
        }
    </script>
    <script>
        // 难度选择提示更新
        document.querySelectorAll('input[name="difficulty"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const hint = document.getElementById('difficultyHint');
                if (this.value === 'easy') {
                    hint.textContent = '简单模式：好单词绿色，坏单词红色，容易区分';
                } else {
                    hint.textContent = '困难模式：好单词和坏单词颜色相同，难以区分！';
                }
            });
        });
    </script>
</body>
</html>
