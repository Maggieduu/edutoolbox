<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的上传 - Edu Toolbox</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #DBEAFE;
        }
        .page-header {
            background: linear-gradient(180deg, #3B82F6 0%, #1D4ED8 100%);
            padding: 80px 20px 60px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-size: 42px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px #1E3A8A;
        }
        .page-header p {
            font-size: 18px;
            color: #fff;
            font-weight: 600;
            text-shadow: 2px 2px 0px #1E3A8A;
        }
        .btn-back {
            background: white;
            color: #333;
            border: 3px solid #333;
            padding: 12px 24px;
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 5px 5px 0px #333;
            transition: transform 0.2s;
        }
        .btn-back:hover {
            transform: translateY(-3px);
        }
        @media (max-width: 768px) {
            .page-header {
                padding: 60px 20px 40px;
                border-radius: 0 0 30px 30px;
            }
            .page-header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>📤 我的上传</h1>
        <p>我上传的原创模板</p>
    </div>

    <div class="max-w-4xl mx-auto px-4 pb-12">
        <div class="mb-6 text-center">
            <a href="community.html" class="btn-back">← 返回社区</a>
        </div>

        <div id="uploads-container" class="space-y-4">
            <p class="text-center py-12 text-gray-500">加载中...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="index.html">首页</a>
            <a href="games.html">游戏</a>
            <a href="tools.html">工具</a>
            <a href="ai.html">AI助手</a>
            <a href="resources.html">其他资源</a>
            <a href="community.html">社区</a>
        </div>
        <p>&copy; 2024 Edu Toolbox. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/data.js"></script>
    <script src="js/shared.js"></script>
    <script>
        async function loadUploads() {
            const container = document.getElementById('uploads-container');

            if (!currentUser) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-xl text-gray-600 mb-4">请先登录查看上传</p>
                        <button onclick="openLoginModal()" class="bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-bold py-3 px-6 rounded-xl">
                            登录
                        </button>
                    </div>
                `;
                return;
            }

            try {
                const { data, error } = await window.sb.from('templates')
                    .select('*')
                    .eq('author', currentUser.email)
                    .is('cloned_from', null)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12">
                            <p class="text-4xl mb-4">📤</p>
                            <p class="text-xl text-gray-600 mb-4">还没有上传任何模板</p>
                            <a href="community.html" class="inline-block bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-bold py-3 px-6 rounded-xl">
                                去社区上传
                            </a>
                        </div>
                    `;
                    return;
                }

                const gameTypeLabels = {
                    'gomoku': '🎮 五子棋',
                    'word-search': '🔍 汉字大侦探',
                    'flashcards': '🃏 生词翻翻看',
                    'snake': '🐍 贪吃蛇',
                    'scrambled': '📝 疯狂的句子',
                    'name-picker': '🎯 随机点名器'
                };

                container.innerHTML = data.map(template => `
                    <div class="bg-white rounded-2xl p-6 border-3 border-gray-300 shadow-lg">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="inline-block bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm font-bold mb-2">
                                    ${gameTypeLabels[template.game_type] || template.game_type}
                                </span>
                                <h3 class="text-xl font-bold text-gray-800">${template.title}</h3>
                                <p class="text-gray-500 text-sm mt-1">by ${template.author_name || template.author}</p>
                            </div>
                            <button onclick="deleteTemplate('${template.id}')" class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-sm font-bold hover:bg-red-200 transition-colors">
                                删除
                            </button>
                        </div>
                        <p class="text-gray-600 mb-4">${template.description || '暂无描述'}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-gray-200">
                            <span class="text-gray-400 text-sm">${template.play_count || 0} 次游玩</span>
                            <button onclick="playTemplate('${template.id}')" class="bg-gradient-to-r from-green-400 to-teal-500 text-white font-bold py-2 px-6 rounded-xl hover:from-green-500 hover:to-teal-600 transition-all">
                                ▶ 开始游戏
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('加载失败:', error);
                container.innerHTML = '<p class="text-center text-red-500 py-12">加载失败，请刷新重试</p>';
            }
        }

        async function deleteTemplate(templateId) {
            if (!confirm('确定要删除这个模板吗？')) return;

            try {
                const { error } = await window.sb.from('templates').delete().eq('id', templateId);
                if (error) throw error;
                
                loadUploads();

            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败');
            }
        }

        async function playTemplate(templateId) {
            try {
                const { data, error } = await window.sb.from('templates').select('*').eq('id', templateId).single();
                if (error || !data) {
                    alert('模板不存在');
                    return;
                }

                localStorage.setItem('currentTemplate', JSON.stringify(data));

                const gamePaths = {
                    'gomoku': './names/Name1/index.html',
                    'word-search': './names/Name2/index.html',
                    'flashcards': './names/Name4/index.html',
                    'snake': './names/Name5/index.html',
                    'scrambled': './names/Name6/index.html',
                    'name-picker': './names/Name7/index.html',
                    'who-is-mole': './names/Name8/index.html'
                };

                const gamePath = gamePaths[data.game_type] || './names/Name1/index.html';
                window.location.href = `play.html?src=${gamePath}&template=${templateId}`;

            } catch (error) {
                console.error('加载失败:', error);
                alert('加载失败');
            }
        }

        async function initPage() {
            await window.sb.auth.getSession();
            loadUploads();
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
