<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏 - Edu Toolbox</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background: #FFFDE7;
            min-height: 100vh;
            font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
        }

        .game-header {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
        }

        .game-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: white;
            color: #333;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            border: 3px solid #333;
            box-shadow: 5px 5px 0px #333;
            transition: all 0.2s;
        }

        .game-back-btn:hover {
            background: #FFE500;
            transform: translateY(-3px);
            box-shadow: 5px 8px 0px #333;
        }

        .game-frame {
            width: 100%;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="game-header">
        <a href="#" class="game-back-btn" onclick="goBack(event)">
            ← 返回
        </a>
    </div>

    <iframe class="game-frame" id="gameFrame" src="" frameborder="0"></iframe>

    <script>
        function goBack(e) {
            if (e) e.preventDefault();
            if (document.referrer && document.referrer !== window.location.href) {
                window.location.href = document.referrer;
            } else {
                window.history.back();
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const gameSrc = params.get('src');

            if (gameSrc) {
                document.getElementById('gameFrame').src = gameSrc;
            }
        });
    </script>

</body>
</html>
