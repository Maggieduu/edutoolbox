<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手 - Edu Toolbox</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #FFFDE7;
        }

        .page-header {
            background: linear-gradient(180deg, #FFE500 0%, #FF6B6B 50%, #FF8E53 100%);
            padding: 80px 20px 60px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 42px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px #333;
        }

        .page-header p {
            font-size: 18px;
            color: #fff;
            font-weight: 600;
            text-shadow: 2px 2px 0px #333;
        }

        .page-content {
            padding: 0 40px 60px;
        }

        .card::before {
            background: linear-gradient(90deg, #6366F1, #8B5CF6) !important;
        }
        .card:hover {
            box-shadow: 10px 10px 0px #6366F1 !important;
            border-color: #6366F1;
        }
        .card .btn {
            color: #6366F1 !important;
        }
        .category-badge.badge-ai {
            background: #EEF2FF;
            color: #6366F1;
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 60px 20px 40px;
                border-radius: 0 0 30px 30px;
            }
            .page-header h1 {
                font-size: 32px;
            }
            .page-content {
                padding: 0 20px 60px;
            }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>🤖 <span data-i18n="catAi">AI助手</span></h1>
        <p data-i18n="catAi">智能辅助教学创作</p>
    </div>

    <div class="page-content">
        <div class="cards-grid" id="cardsContainer">
            <!-- Cards will be generated by JavaScript -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-links">
            <a href="index.html">首页</a>
            <a href="games.html">游戏</a>
            <a href="tools.html">工具</a>
            <a href="ai.html">AI助手</a>
            <a href="resources.html">其他资源</a>
            <a href="community.html">社区</a>
        </div>
        <p>&copy; 2024 Edu Toolbox. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/data.js"></script>
    <script src="js/shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            generateCards(SITE_DATA.aiTools, 'cardsContainer');
        });
    </script>
</body>
</html>
